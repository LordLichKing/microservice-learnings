server:
  port: 8082

spring:
  application:
    name: storage-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/seata_storage?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: ''
        group: DEFAULT_GROUP

seata:
  enabled: true
  application-id: ${spring.application.name}
  tx-service-group: test_tx_group
  service:
    vgroup-mapping:
      test_tx_group: default
  enable_auto_data_source_proxy: true
  registry:
    type: nacos
    nacos:
      server-addr: 127.0.0.1:8848
      application: seata-server
      group: SEATA_GROUP  # 避坑： 这里不能省略group字段。网上很多教程和视频说可以，实测不行。
      cluster: default
    config:
      type: default
